<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Payment</title>
</head>
<body>
    <form id="order-form">
        <input type="text" id="customer-name" placeholder="আপনার নাম" required>
        <input type="text" id="whatsapp-number" placeholder="হোয়াটসঅ্যাপ নম্বর" required>
        <input type="hidden" id="package-name" value="Mihad Boom Shorts Service">
        <input type="number" id="price" value="500" readonly>
        <input type="text" id="trx-id" placeholder="ট্রানজেকশন আইডি" required>
        <button type="submit" id="submit-btn">Confirm Order</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="order.js"></script>
</body>
</html>
