<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>Admin Panel — Mihad Boom Shorts</title>
<style>
:root{--bg:#070707;--panel:#10100f;--panel2:#151411;--gold:#f4c430;--blue:#2aabee;--green:#25d366;--red:#ff5757;--text:#f7f6f1;--muted:#a6a39a;--line:rgba(244,196,48,.25)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,rgba(244,196,48,.07),transparent 30%),var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;min-height:100vh}button,input,textarea{font:inherit}.hidden{display:none!important}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(430px,100%);padding:34px;border:1px solid var(--line);border-radius:22px;background:rgba(16,16,15,.96);box-shadow:0 24px 70px rgba(0,0,0,.45)}.brand{color:var(--gold);font-weight:900;font-size:22px;line-height:1.1}.login h1{font-size:30px;margin:25px 0 8px}.muted{color:var(--muted);line-height:1.55}.field{display:grid;gap:7px;margin:15px 0}.field label{font-size:12px;color:#d4d0c5;font-weight:700}.field input,.field textarea{width:100%;border:1px solid rgba(244,196,48,.19);border-radius:11px;background:#090909;color:var(--text);padding:12px 13px;outline:none}.field input:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(244,196,48,.08)}.field textarea{min-height:100px;resize:vertical}.primary,.secondary,.danger{border:0;border-radius:11px;padding:12px 17px;font-weight:800;cursor:pointer;transition:.2s}.primary{background:linear-gradient(135deg,#c9950d,var(--gold),#ffe078);color:#151100;box-shadow:0 9px 24px rgba(244,196,48,.15)}.secondary{background:rgba(42,171,238,.11);color:#78d3ff;border:1px solid rgba(42,171,238,.38)}.danger{background:rgba(255,87,87,.1);color:#ff8585;border:1px solid rgba(255,87,87,.3)}button:hover{transform:translateY(-1px);filter:brightness(1.06)}button:disabled{opacity:.55;cursor:not-allowed}.login .primary{width:100%;margin-top:8px}.error{color:#ff8080;font-size:13px;min-height:18px}.topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:15px 4%;background:rgba(7,7,7,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.top-actions{display:flex;gap:9px;align-items:center}.top-actions a{color:#79d5ff;text-decoration:none;font-size:13px}.shell{display:grid;grid-template-columns:230px 1fr;max-width:1400px;margin:auto;min-height:calc(100vh - 70px)}.sidebar{padding:26px 16px;border-right:1px solid rgba(244,196,48,.14)}.tab{width:100%;text-align:left;border:0;padding:12px 14px;margin:3px 0;border-radius:10px;background:transparent;color:var(--muted);font-weight:700;cursor:pointer}.tab.active{color:var(--gold);background:rgba(244,196,48,.09)}.content{padding:32px 4% 70px;min-width:0}.pane{display:none}.pane.active{display:block}.pane-head{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:22px}.pane h2{margin:0;font-size:clamp(25px,4vw,38px);color:var(--gold)}.card{background:var(--panel);border:1px solid rgba(244,196,48,.18);border-radius:17px;padding:20px;margin-bottom:18px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 16px}.span-2{grid-column:1/-1}.check{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;margin:15px 0}.check input{width:17px;height:17px}.form-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.items{display:grid;gap:11px}.item{display:grid;grid-template-columns:58px minmax(0,1fr) auto;gap:13px;align-items:center;padding:12px;border:1px solid rgba(244,196,48,.14);border-radius:13px;background:#0b0b0a}.thumb-mini{width:58px;height:58px;border-radius:10px;background:#161512;object-fit:cover;display:grid;place-items:center;color:var(--gold)}.item h3{font-size:15px;margin:0 0 5px}.item p{font-size:12px;color:var(--muted);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item-actions{display:flex;gap:7px}.item-actions button{padding:8px 10px;font-size:11px}.empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed rgba(244,196,48,.2);border-radius:13px}.toast{position:fixed;right:20px;bottom:20px;z-index:100;padding:13px 18px;border-radius:12px;background:#17251c;color:#6af09a;border:1px solid rgba(37,211,102,.4);box-shadow:0 15px 40px rgba(0,0,0,.4)}.setup{border-color:rgba(255,87,87,.35);background:rgba(255,87,87,.05)}code{color:#ffe17b}small{color:var(--muted)}@media(max-width:800px){.shell{grid-template-columns:1fr}.sidebar{display:flex;overflow-x:auto;border-right:0;border-bottom:1px solid rgba(244,196,48,.14);padding:10px}.tab{width:auto;white-space:nowrap}.content{padding-top:22px}.form-grid{grid-template-columns:1fr}.span-2{grid-column:auto}.item{grid-template-columns:48px minmax(0,1fr)}.thumb-mini{width:48px;height:48px}.item-actions{grid-column:1/-1;justify-content:flex-end}.top-actions a{display:none}}
</style>
</head>
<body>
<section id="login-view" class="login"><form id="login-form" class="login-card"><div class="brand">MIHAD BOOM<br>SHORTS</div><h1>Admin Login</h1><p class="muted">Website content পরিচালনা করতে আপনার Supabase admin account দিয়ে login করুন।</p><div id="config-warning" class="card setup hidden">আগে <code>config.js</code>-এ Supabase URL ও anon key বসান।</div><div class="field"><label>Email</label><input id="login-email" type="email" required autocomplete="username"></div><div class="field"><label>Password</label><input id="login-password" type="password" required autocomplete="current-password"></div><div id="login-error" class="error"></div><button class="primary" type="submit">Login to Dashboard</button></form></section>
<div id="app-view" class="hidden"><header class="topbar"><div class="brand">MIHAD BOOM ADMIN</div><div class="top-actions"><a href="index.html" target="_blank">View Website ↗</a><button id="logout" class="danger">Logout</button></div></header><div class="shell"><aside class="sidebar"><button class="tab active" data-tab="settings">⚙ Settings</button><button class="tab" data-tab="packages">📦 Packages</button><button class="tab" data-tab="stats">📊 Stats</button><button class="tab" data-tab="demos">▶ Demo Videos</button></aside><main class="content">
<section id="pane-settings" class="pane active"><div class="pane-head"><h2>Website Settings</h2></div><form id="settings-form" class="card form-grid"><div class="field span-2"><label>Hero headline</label><input name="hero_title" required></div><div class="field span-2"><label>Hero description</label><textarea name="hero_subtitle" required></textarea></div><div class="field"><label>WhatsApp number (country codeসহ)</label><input name="whatsapp"></div><div class="field"><label>Telegram link</label><input name="telegram"></div><div class="field"><label>Facebook link</label><input name="facebook"></div><div class="field"><label>YouTube link</label><input name="youtube"></div><div class="field span-2"><label>Footer text</label><input name="footer_text"></div><div class="form-actions span-2"><button class="primary" type="submit">Save Settings</button></div></form></section>
<section id="pane-packages" class="pane"><div class="pane-head"><h2>Packages</h2><button class="secondary" data-new="package">+ New Package</button></div><form id="package-form" class="card form-grid"><input type="hidden" name="id"><div class="field"><label>Package name</label><input name="title" required></div><div class="field"><label>Price (number/text)</label><input name="price" required></div><div class="field span-2"><label>Image URL</label><input name="image_url" placeholder="Upload below or paste URL"></div><div class="field span-2"><label>Upload package image</label><input name="image_file" type="file" accept="image/*"><small>ছবি বাছাই করলে Save-এর সময় Supabase Storage-এ upload হবে।</small></div><div class="field span-2"><label>Headline</label><input name="headline" value="FULL VIRAL CONTENT"></div><div class="field span-2"><label>Description</label><textarea name="description"></textarea></div><div class="field"><label>Display order</label><input name="sort_order" type="number" value="0"></div><label class="check"><input name="active" type="checkbox" checked> Website-এ দেখাবে</label><div class="form-actions span-2"><button class="primary" type="submit">Save Package</button><button class="secondary" type="button" data-cancel="package">Clear</button></div></form><div id="package-items" class="items"></div></section>
<section id="pane-stats" class="pane"><div class="pane-head"><h2>Stats</h2><button class="secondary" data-new="stat">+ New Stat</button></div><form id="stat-form" class="card form-grid"><input type="hidden" name="id"><div class="field"><label>Value</label><input name="value" placeholder="10K+" required></div><div class="field"><label>Label</label><input name="label" placeholder="Happy Clients" required></div><div class="field"><label>Display order</label><input name="sort_order" type="number" value="0"></div><label class="check"><input name="active" type="checkbox" checked> Website-এ দেখাবে</label><div class="form-actions span-2"><button class="primary" type="submit">Save Stat</button><button class="secondary" type="button" data-cancel="stat">Clear</button></div></form><div id="stat-items" class="items"></div></section>
<section id="pane-demos" class="pane"><div class="pane-head"><h2>Demo Videos</h2><button class="secondary" data-new="demo">+ New Demo</button></div><form id="demo-form" class="card form-grid"><input type="hidden" name="id"><div class="field span-2"><label>Video title</label><input name="title" required></div><div class="field span-2"><label>Video URL (YouTube/Facebook/Drive)</label><input name="video_url" placeholder="https://..."></div><div class="field span-2"><label>Thumbnail URL</label><input name="thumbnail_url" placeholder="Upload below or paste URL"></div><div class="field span-2"><label>Upload thumbnail</label><input name="thumbnail_file" type="file" accept="image/*"></div><div class="field span-2"><label>Description</label><textarea name="description"></textarea></div><div class="field"><label>Display order</label><input name="sort_order" type="number" value="0"></div><label class="check"><input name="active" type="checkbox" checked> Demo page-এ দেখাবে</label><div class="form-actions span-2"><button class="primary" type="submit">Save Demo</button><button class="secondary" type="button" data-cancel="demo">Clear</button></div></form><div id="demo-items" class="items"></div></section>
</main></div></div><div id="toast" class="toast hidden"></div><script src="config.js"></script><script src="admin.js"></script></body></html>
